<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Навигация</title>
    <style>
        body {
            font-family: system-ui, -apple-system, sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
            background-color: #f5f7fa;
            color: #333;
        }
        nav {
            text-align: center;
        }
        nav a {
            display: block;
            margin: 12px 0;
            padding: 14px 28px;
            background-color: #C10000;
            color: #ffffff;
            text-decoration: none;
            border-radius: 6px;
            font-size: 16px;
            font-weight: 500;
            transition: background-color 0.2s ease, transform 0.2s ease;
        }
        nav a:hover {
            background-color: #990000;
            transform: translateY(-2px);
        }
    </style>
</head>
<body>
    <nav>
        <a href="mainpage1.html">Главная страница вариант 1</a>
        <a href="mainpage2.html">Главная страница вариант 2</a>
    </nav>
</body>
</html>
